services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal-stack

  redis:
    image: redis:7.0-alpine
    container_name: radio-monoko-redis
    command: >
      sh -c "redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes"
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - internal-stack
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build: .
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    restart: always
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    env_file: .env
    depends_on:
      - db
      - redis
    networks:
      - internal-stack
    ports:
      - "3000:3000"

networks:
  internal-stack:
    driver: bridge

volumes:
  redis-data:
    driver: local
  postgres_data:
    driver: local
