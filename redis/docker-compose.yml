version: '3.8'

services:
  redis:
    image: redis:7.0-alpine
    container_name: radio-monoko-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  redis-data:
    driver: local
